function compressImage(file,maxW,maxH,quality){
  return new Promise(function(resolve,reject){
    var img=new Image();
    var url=URL.createObjectURL(file);
    img.onload=function(){
      URL.revokeObjectURL(url);
      var w=img.naturalWidth,h=img.naturalHeight;
      var scale=Math.min(1,maxW/w,maxH/h);
      var cw=Math.round(w*scale),ch=Math.round(h*scale);
      var canvas=document.createElement("canvas");
      canvas.width=cw;canvas.height=ch;
      var ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,cw,ch);
      // Two-pass: if result still too big, reduce quality further
      var b64=canvas.toDataURL("image/jpeg",quality);
      var kb=Math.round(b64.length*0.75/1024);
      if(kb>200){b64=canvas.toDataURL("image/jpeg",quality*0.6);}
      if(kb>400){b64=canvas.toDataURL("image/jpeg",0.3);}
      resolve(b64);
    };
    img.onerror=reject;
    img.src=url;
  });
}

var GROQ_MODELS=["llama-3.3-70b-versatile","llama3-70b-8192","llama3-8b-8192"];
function callGroqJSON(k,prompt,mx){return _groq(k,prompt,mx||700,0,true);}
function callGroqText(k,prompt,mx){return _groq(k,prompt,mx||600,0,false);}
function _groq(k,prompt,mx,mi,json){
  if(mi>=GROQ_MODELS.length)return Promise.reject(new Error("Nessun modello disponibile."));
  return fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+k},
    body:JSON.stringify({
      model:GROQ_MODELS[mi],max_tokens:mx,temperature:0.7,
      messages:[
        {role:"system",content:json?"Sei un assistente pedagogico italiano. Rispondi SOLO con JSON valido. Nessun testo, nessun markdown.":"Sei un assistente pedagogico italiano. Rispondi in italiano in modo diretto e utile."},
        {role:"user",content:prompt}
      ]
    })
  }).then(function(r){
    if(r.status===429||r.status===503)return _groq(k,prompt,mx,mi+1,json);
    if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||"Errore "+r.status);});
    return r.json();
  }).then(function(d){
    var raw=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||"").trim();
    if(!raw)return _groq(k,prompt,mx,mi+1,json);
    if(!json)return raw;
    raw=raw.replace(/^```(?:json)?[\r\n]*/i,"").replace(/[\r\n]*```$/,"").trim();
    var m=raw.match(/\{[\s\S]*\}/);
    if(!m)return _groq(k,prompt,mx,mi+1,json);
    try{return JSON.parse(m[0]);}catch(e){return _groq(k,prompt,mx,mi+1,json);}
  });
}

  async function valutaAperteProfAI(card,ris){
    if(!orKey){setAskKey(true);return;}
    var dom=card.quizDomande||[];
    var domAI=dom.map(function(d,i){return{d:d,i:i};}).filter(function(x){return x.d.tipo==="aperta";});
    if(!domAI.length)return;
    var pending=ris.filter(function(r){return !r.aiValutato;});
    if(!pending.length)return;
    setQLoading(true);
    try{
      for(var ri=0;ri<pending.length;ri++){
        var r=pending[ri];
        var aiScores=r.aiScores||{};
        for(var di=0;di<domAI.length;di++){
          var item=domAI[di];
          var risposta=(r.risposte&&r.risposte[item.i])||"";
          if(!risposta.trim())continue;
          var prompt=
            "Sei un docente esperto di IRC in una scuola secondaria di II grado.\n"+
            "Valuta la risposta aperta con una valutazione APPROFONDITA E DETTAGLIATA.\n\n"+
            "DOMANDA: "+item.d.testo+"\n"+
            "RISPOSTA DELLO STUDENTE: "+risposta+"\n\n"+
            "Restituisci SOLO questo oggetto JSON (nessun testo esterno):\n"+
            "{\n"+
            "  \"voto\": <numero 0.0-1.0>,\n"+
            "  \"punti_forza\": \"<MINIMO 3 frasi. Cita testualmente la risposta. Spiega PERCHE dimostra comprensione. Collega ai contenuti IRC.>\",\n"+
            "  \"lacune\": \"<MINIMO 3 frasi. Indica ESATTAMENTE i concetti mancanti o errati. Spiega perche sono importanti. Cosa avrebbe dovuto studiare.>\",\n"+
            "  \"suggerimento\": \"<MINIMO 3 frasi. Attivita specifica di rinforzo. Come presentarla in classe. Domanda stimolo concreta da porre allo studente.>\"\n"+
            "}\n\n"+
            "Criteri: 0.75-1.0=completa e argomentata; 0.4-0.74=parziale; 0.0-0.39=assente o errata.\n"+
            "OGNI campo testo: minimo 60 parole, specifico su questa risposta, linguaggio da docente.";
          try{
            var res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
              method:"POST",
              headers:{"Content-Type":"application/json","Authorization":"Bearer "+orKey},
              body:JSON.stringify({
                model:"llama-3.3-70b-versatile",
                max_tokens:1500,
                temperature:0.6,
                messages:[
                  {role:"system",content:"Sei un valutatore pedagogico italiano esperto. Produci valutazioni dettagliate e personalizzate. Rispondi SOLO con JSON valido, senza markdown."},
                  {role:"user",content:prompt}
                ]
              })
            });
            var j=await res.json();
            var raw=(j.choices&&j.choices[0]&&j.choices[0].message.content)||"";
            raw=raw.replace(/^```(?:json)?[\r\n]*/i,"").replace(/[\r\n]*```$/,"").trim();
            var m=raw.match(/\{[\s\S]*\}/);
            if(m){
              var p=JSON.parse(m[0]);
              aiScores[item.i]={
                voto:p.voto||0,
                punti_forza:p.punti_forza||"",
                lacune:p.lacune||"",
                suggerimento:p.suggerimento||""
              };
            }
          }catch(e){console.warn("AI valuta domanda "+item.i+":",e);}
        }
        var score=0,totale=dom.length;
        dom.forEach(function(d,idx){
          if(d.tipo==="aperta"){score+=aiScores[idx]?aiScores[idx].voto:0;}
          else{
            if(d.corretta==null||d.corretta===""){totale--;return;}
            if(r.risposte&&r.risposte[idx]===d.corretta)score+=1;
          }
        });
        var pct=totale>0?Math.round(score/totale*100):0;
        await db.collection("quiz_risposte").doc(String(card.id)+"_"+r.studente).update({
          aiValutato:true,aiScores:aiScores,
          punteggio:{score:Math.round(score*10)/10,totale:totale,pct:pct}
        });
      }
    }catch(e){console.warn("valutaAperteProfAI:",e);}
    setQLoading(false);
  }

  function cardContext(card){
    var commTxt=(card.commenti||[]).length
      ?(card.commenti||[]).map(function(cm){var r="  - "+cm.autore+": \""+cm.testo+"\"";if(cm.risposte&&cm.risposte.length)r+=cm.risposte.map(function(rep){return"\n    ↳ "+rep.autore+": \""+rep.testo+"\"";}).join("");return r;}).join("\n")
      :"nessun commento";
    var votiTxt="";
    if(card.opzioni){var tv=card.opzioni.reduce(function(a,o){return a+o.voti.length;},0);votiTxt="\nVoti (totale "+tv+"):\n"+card.opzioni.map(function(o){var p=tv>0?Math.round(o.voti.length/tv*100):0;return"  - \""+o.testo+"\": "+o.voti.length+" ("+p+"%)";}).join("\n");}
    var quizTxt="";
    if(card.tipo==="quiz"&&card.quizDomande&&card.quizDomande.length){
      quizTxt="\nDomande quiz:\n"+card.quizDomande.map(function(d,i){
        var corrIdx=parseInt(d.corretta);
        var corrTxt=d.tipo==="multipla"?(d.opzioni&&!isNaN(corrIdx)?d.opzioni[corrIdx]:d.corretta):d.corretta;
        var opsTxt="";
        if(d.tipo==="multipla"&&d.opzioni){opsTxt=" ("+d.opzioni.map(function(o,j){return (j===corrIdx?"[OK]":"")+o;}).join(", ")+")";}
        var corrStr=(corrTxt&&d.tipo!=="aperta")?" corretta="+corrTxt:"";
        return "  "+(i+1)+". ["+d.tipo+"] "+d.testo+opsTxt+corrStr;
      }).join("\n");
      var ris=quizRisposte.filter(function(r){return String(r.cardId)===String(card.id);});
      if(ris.length){
        quizTxt+="\nRisposte studenti ("+ris.length+"):\n"+ris.map(function(r){
          var lines="  "+r.studente+" ("+r.punteggio.pct+"%):\n";
          lines+=(card.quizDomande||[]).map(function(d,i){
            var rr=r.risposte&&r.risposte[i];
            var corrIdx=parseInt(rr);
            var rispTxt=d.tipo==="multipla"?(d.opzioni&&!isNaN(corrIdx)&&d.opzioni[corrIdx]?d.opzioni[corrIdx]:rr||"-"):rr||"-";
            return "    D"+(i+1)+": "+rispTxt;
          }).join("\n");
          return lines;
        }).join("\n");
      }
    }
    return 'Titolo: "'+card.titolo+'"\nTipo: '+card.tipo+'\nTesto: '+(card.testo||"(nessuno)")+'\nLike: '+(card.likes||0)+votiTxt+quizTxt+'\nCommenti ('+((card.commenti||[]).length)+'):\n'+commTxt;
  }

  // ── Calcola heatmap partecipazione ──
  function calcolaHeatmap(){
    var grid={};
    var settimane=[];
    cards.filter(function(c){return !c.proposta;}).forEach(function(c){
      var d=new Date(c.data);
      var weekKey=Math.floor(d.getTime()/(7*86400000));
      if(settimane.indexOf(weekKey)<0)settimane.push(weekKey);
      (c.commenti||[]).forEach(function(cm){
        var k=cm.autore+"_"+weekKey;
        grid[k]=(grid[k]||0)+1;
      });
      (c.opzioni||[]).forEach(function(op){
        (op.voti||[]).forEach(function(vn){
          var k=vn+"_"+weekKey;
          grid[k]=(grid[k]||0)+1;
        });
      });
    });
    settimane.sort();
    setHeatmapData({grid:grid,settimane:settimane.slice(-6)});
    setShowHeatmap(true);
  }

                return h("button",{key:nome,onClick:function(){setShowMsgPrivato(function(p){return Object.assign({},p,{studenteName:nome});});if(haMsg)setMsgPrivatoTesto(msgPerCard[nome].testo||"");else setMsgPrivatoTesto("");},style:{padding:"5px 11px",borderRadius:8,border:"1px solid "+(sel?"#f59e0b":"rgba(255,255,255,.15)"),background:sel?"rgba(245,158,11,.25)":"rgba(255,255,255,.05)",color:sel?"#fbbf24":"rgba(255,255,255,.6)",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:5}},
                  haMsg&&h("span",{style:{fontSize:9,color:"#4ade80",fontWeight:800}},"✓"),nome
                );
              }),
              h("div",{style:{width:"100%",marginBottom:4}},
                h("label",{style:{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.4)",letterSpacing:1,display:"block",marginBottom:4}},"✉️ MESSAGGIO"),
                h("textarea",{value:msgPrivatoTesto,onInput:function(e){setMsgPrivatoTesto(e.target.value);},rows:4,disabled:!showMsgPrivato.studenteName,placeholder:showMsgPrivato.studenteName?"Scrivi un feedback privato per "+showMsgPrivato.studenteName+"…":"Seleziona prima uno studente sopra",style:Object.assign({},S.input,{resize:"vertical",opacity:showMsgPrivato.studenteName?1:.5})})
              )
            )
          );
        })(),
        h("div",{style:{display:"flex",gap:10,marginTop:8}},
          h("button",{onClick:function(){setShowMsgPrivato(null);setMsgPrivatoTesto("");},style:{flex:1,padding:11,background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.6)",border:"none",borderRadius:11,fontSize:13,fontWeight:700,cursor:"pointer"}},"Chiudi"),
          h("button",{onClick:function(){
            if(!showMsgPrivato.studenteName||!msgPrivatoTesto.trim())return;
            msgPrivatoSave(showMsgPrivato.cardId,showMsgPrivato.studenteName,msgPrivatoTesto.trim(),myName(user))
              .then(function(){setShowMsgPrivato(null);setMsgPrivatoTesto("");})
              .catch(function(e){alert("Errore: "+e.message);});
          },disabled:!showMsgPrivato.studenteName||!msgPrivatoTesto.trim(),style:{flex:2,padding:11,background:showMsgPrivato.studenteName&&msgPrivatoTesto.trim()?"linear-gradient(135deg,#f59e0b,#f97316)":"rgba(255,255,255,.08)",color:showMsgPrivato.studenteName&&msgPrivatoTesto.trim()?"#fff":"rgba(255,255,255,.3)",border:"none",borderRadius:11,fontSize:14,fontWeight:800,cursor:showMsgPrivato.studenteName&&msgPrivatoTesto.trim()?"pointer":"not-allowed"}},"✉️ Invia")
        )
      )
    ),

    // ── INBOX MESSAGGI PRIVATI (STUDENTE) ──
    showMsgInbox&&!isProf&&h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:20},onClick:function(){setShowMsgInbox(false);}},
      h("div",{style:{background:"#1e293b",border:"1px solid rgba(245,158,11,.35)",borderRadius:20,padding:26,maxWidth:480,width:"100%",maxHeight:"85vh",overflowY:"auto"},onClick:function(e){e.stopPropagation();}},
        h("div",{style:{marginBottom:16}},
          h("h3",{style:{margin:"0 0 4px",color:"#f1f5f9",fontSize:16,fontWeight:800}},"✉️ Messaggi dal Professore"),
          h("p",{style:{margin:0,color:"rgba(255,255,255,.4)",fontSize:12}},"Feedback privati ricevuti")
        ),
        msgPrivatiStudente.length===0
          ?h("div",{style:{textAlign:"center",color:"rgba(255,255,255,.25)",padding:40,fontSize:13}},"Nessun messaggio privato")
          :msgPrivatiStudente.map(function(msg){
            var card=cards.find(function(c){return String(c.id)===String(msg.cardId);});
            return h("div",{key:msg.id,style:{background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,"+(msg.letto?".15":".4")+")",borderRadius:12,padding:"12px 14px",marginBottom:8}},
              !msg.letto&&h("span",{style:{background:"#f59e0b",color:"#1a1a2e",borderRadius:20,padding:"1px 7px",fontSize:9,fontWeight:800,marginBottom:6,display:"inline-block"}},"NUOVO"),
              card&&h("div",{style:{fontSize:10,color:"rgba(255,255,255,.4)",marginBottom:6,fontWeight:700}},"📌 "+card.titolo),
              h("div",{style:{fontSize:13,color:"rgba(255,255,255,.9)",lineHeight:1.7,whiteSpace:"pre-wrap"}},msg.testo),
              h("div",{style:{fontSize:10,color:"rgba(255,255,255,.3)",marginTop:6}},"✍️ "+msg.prof+" · "+fmtDT(msg.data))
            );
          }),
        h("button",{onClick:function(){setShowMsgInbox(false);},style:{width:"100%",marginTop:8,padding:11,background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.6)",border:"none",borderRadius:11,fontSize:13,fontWeight:700,cursor:"pointer"}},"Chiudi")
      )
    ),

    // ── LEADERBOARD ──
    showLeaderboard&&h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:20},onClick:function(){setShowLeaderboard(false);}},
      h("div",{style:{background:"#1e293b",border:"1px solid rgba(245,158,11,.4)",borderRadius:20,padding:26,maxWidth:440,width:"100%",maxHeight:"85vh",overflowY:"auto"},onClick:function(e){e.stopPropagation();}},
        h("div",{style:{textAlign:"center",marginBottom:16}},
          h("div",{style:{fontSize:36,marginBottom:4}},"🏆"),
          h("h3",{style:{margin:"0 0 4px",color:"#f1f5f9",fontSize:16,fontWeight:800}},"Classifica Partecipazione"),
          h("p",{style:{margin:0,color:"rgba(255,255,255,.4)",fontSize:11}},"Punti accumulati dagli studenti")
        ),
        (function(){
          var lista=Object.entries(puntiStudenti).map(function(e){return{nome:e[0],punti:e[1].punti||0};});
          lista.sort(function(a,b){return b.punti-a.punti;});
          if(lista.length===0)return h("div",{style:{textAlign:"center",color:"rgba(255,255,255,.3)",padding:30}},"Nessun punto ancora accumulato");
          return h(Fragment,null,lista.map(function(s,i){
            var liv=calcolaLivello(s.punti);
            var medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
            var nome=isProf?s.nome:(s.nome===myName(user)?s.nome:s.nome.split(" ").map(function(p){return p[0]+".";}). join(" "));
            return h("div",{key:s.nome,style:{display:"flex",alignItems:"center",gap:10,background:i<3?"rgba(245,158,11,.08)":"rgba(255,255,255,.03)",border:"1px solid "+(i<3?"rgba(245,158,11,.2)":"rgba(255,255,255,.06)"),borderRadius:10,padding:"10px 14px",marginBottom:6}},
              h("span",{style:{fontSize:18,width:28}},medal||"#"+(i+1)),
              h("span",{style:{fontSize:14,flex:1,fontWeight:i<3?800:500,color:i<3?"#fbbf24":"rgba(255,255,255,.7)"}},nome),
              h("span",{style:{fontSize:12,color:liv.colore,fontWeight:700}},liv.emoji+" "+liv.nome),
              h("span",{style:{background:"rgba(255,255,255,.1)",borderRadius:20,padding:"2px 8px",fontSize:12,fontWeight:800,color:"#f1f5f9"}},s.punti+" pt")
            );
          }));
        })(),
        h("button",{onClick:function(){setShowLeaderboard(false);},style:{width:"100%",marginTop:12,padding:11,background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.6)",border:"none",borderRadius:11,fontSize:13,fontWeight:700,cursor:"pointer"}},"Chiudi")
      )
    ),

    // ── HEATMAP PARTECIPAZIONE ──
    showHeatmap&&h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:20},onClick:function(){setShowHeatmap(false);}},
      h("div",{style:{background:"#1e293b",border:"1px solid rgba(99,102,241,.4)",borderRadius:20,padding:26,maxWidth:700,width:"100%",maxHeight:"85vh",overflowY:"auto"},onClick:function(e){e.stopPropagation();}},
        h("div",{style:{marginBottom:16}},
          h("h3",{style:{margin:"0 0 4px",color:"#f1f5f9",fontSize:16,fontWeight:800}},"🔥 Heatmap Partecipazione"),
          h("p",{style:{margin:0,color:"rgba(255,255,255,.4)",fontSize:11}},"Intensità di interazione per studente nelle ultime settimane")
        ),
        (function(){
          var grid=heatmapData.grid||{};
          var settimane=heatmapData.settimane||[];
          var studentiNomi=[];
          Object.keys(grid).forEach(function(k){var n=k.split("_")[0];if(studentiNomi.indexOf(n)<0&&n!=="Prof")studentiNomi.push(n);});
          studentiNomi.sort();
          var maxVal=Object.values(grid).reduce(function(a,v){return Math.max(a,v);},1);
          if(studentiNomi.length===0)return h("div",{style:{textAlign:"center",color:"rgba(255,255,255,.3)",padding:30}},"Nessun dato disponibile. Occorrono almeno dei commenti o voti.");
          return h("div",{style:{overflowX:"auto"}},
            h("table",{style:{borderCollapse:"collapse",width:"100%",minWidth:300}},
              h("thead",null,h("tr",null,
                h("th",{style:{padding:"4px 10px",fontSize:10,color:"rgba(255,255,255,.4)",textAlign:"left",fontWeight:700}},"Studente"),
                settimane.map(function(w,i){
                  var d=new Date(w*7*86400000);
                  return h("th",{key:w,style:{padding:"4px 8px",fontSize:9,color:"rgba(255,255,255,.4)",textAlign:"center",fontWeight:700}},"S"+(i+1));
                })
              )),
              h("tbody",null,studentiNomi.map(function(nome){
                return h("tr",{key:nome},
                  h("td",{style:{padding:"4px 10px",fontSize:11,color:"rgba(255,255,255,.7)",whiteSpace:"nowrap",fontWeight:600}},nome),
                  settimane.map(function(w){
                    var v=grid[nome+"_"+w]||0;
                    var pct=maxVal>0?v/maxVal:0;
                    var bg=pct===0?"rgba(255,255,255,.04)":("rgba(99,102,241,"+Math.min(.9,0.1+pct*.8).toFixed(2)+")");
                    return h("td",{key:w,title:v+" interazioni",style:{padding:"4px 8px",textAlign:"center"}},
                      h("div",{style:{width:28,height:28,borderRadius:6,background:bg,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:pct>0.3?"#fff":"rgba(255,255,255,.3)",fontWeight:700}},v>0?v:"")
                    );
                  })
                );
              }))
            )
          );
        })(),
        h("div",{style:{marginTop:14,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}},
          h("span",{style:{fontSize:10,color:"rgba(255,255,255,.35)"}},"Intensità:"),
          [0,.25,.5,.75,1].map(function(p,i){return h("div",{key:i,style:{display:"flex",alignItems:"center",gap:3}},h("div",{style:{width:16,height:16,borderRadius:4,background:p===0?"rgba(255,255,255,.04)":"rgba(99,102,241,"+Math.min(.9,0.1+p*.8).toFixed(2)+")"}}),h("span",{style:{fontSize:9,color:"rgba(255,255,255,.3)"}},["0","basso","medio","alto","max"][i]));})
        ),
        h("button",{onClick:function(){setShowHeatmap(false);},style:{width:"100%",marginTop:12,padding:11,background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.6)",border:"none",borderRadius:11,fontSize:13,fontWeight:700,cursor:"pointer"}},"Chiudi")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
})();
</script>
