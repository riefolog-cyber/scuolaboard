function fmt(d){return new Date(d).toLocaleDateString("it-IT",{day:"2-digit",month:"short",year:"numeric"});}
function fmtDT(d){
  if(!d)return"";
  if(typeof d==="string"&&d.length===10)return new Date(d+"T12:00:00").toLocaleDateString("it-IT",{day:"2-digit",month:"short",year:"numeric"});

function isNew(d){return Date.now()-new Date(d).getTime()<86400000;}
function timeAgo(d){
  if(!d)return"";
  var ms=Date.now()-new Date(d).getTime();
  var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60),days=Math.floor(h/24),weeks=Math.floor(days/7);
  if(s<60)return"ora";
  if(m<60)return m+"m fa";

  if(days<7)return days+"g fa";
  if(weeks<5)return weeks+"sett fa";
  return fmt(d);
}

function useCountUp(target,duration){
  var [val,setVal]=useState(0);
  useEffect(function(){
    if(!target)return;
    var start=0,step=Math.ceil(target/30),t=null;
    function tick(){start+=step;if(start>=target){setVal(target);return;}setVal(start);t=setTimeout(tick,duration/30);}
    t=setTimeout(tick,50);
    return function(){if(t)clearTimeout(t);};
  },[target]);
  return val;
}

function compressImage(file,maxW,maxH,quality){
  return new Promise(function(resolve,reject){
    var img=new Image();
    var url=URL.createObjectURL(file);
    img.onload=function(){
      URL.revokeObjectURL(url);
      var w=img.naturalWidth,h=img.naturalHeight;
      var scale=Math.min(1,maxW/w,maxH/h);
      var cw=Math.round(w*scale),ch=Math.round(h*scale);
      var canvas=document.createElement("canvas");
      canvas.width=cw;canvas.height=ch;
      var ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,cw,ch);
      var TARGET_KB=90;
      var b64=canvas.toDataURL("image/jpeg",quality);
      var kb=Math.round(b64.length*0.75/1024);
      if(kb>TARGET_KB){b64=canvas.toDataURL("image/jpeg",quality*0.65);kb=Math.round(b64.length*0.75/1024);}
      if(kb>TARGET_KB*2){var c2=document.createElement("canvas");c2.width=Math.round(cw*0.75);c2.height=Math.round(ch*0.75);c2.getContext("2d").drawImage(canvas,0,0,c2.width,c2.height);b64=c2.toDataURL("image/jpeg",0.6);}
      if(kb>TARGET_KB*3){b64=canvas.toDataURL("image/jpeg",0.4);}
      resolve(b64);
    };
    img.onerror=reject;
    img.src=url;
  });
}

function aiLoad(cb){

var GROQ_MODELS=["openai/gpt-oss-120b","llama-3.3-70b-versatile","llama3-70b-8192"];
function callGroqJSON(k,prompt,mx){return _groq(k,prompt,mx||700,0,true);}
function callGroqText(k,prompt,mx){return _groq(k,prompt,mx||600,0,false);}
function _groq(k,prompt,mx,mi,json){
  if(mi>=GROQ_MODELS.length)return Promise.reject(new Error("Nessun modello disponibile."));
  return fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+k},
    body:JSON.stringify({
      model:GROQ_MODELS[mi],max_tokens:mx,temperature:0.7,
      messages:[
        {role:"system",content:json?"Sei un esperto di didattica per una scuola secondaria italiana. Rispondi SOLO con JSON valido. Nessun testo prima o dopo il JSON, nessun markdown, nessun commento.":"Sei un esperto di didattica per una scuola secondaria italiana. Rispondi in italiano, in modo diretto e professionale, come faresti con un collega docente."},
        {role:"user",content:prompt}
      ]
    })
  }).then(function(r){
    if(r.status===429||r.status===503)return _groq(k,prompt,mx,mi+1,json);
    if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||"Errore "+r.status);});
    return r.json();
  }).then(function(d){
    var raw=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||"").trim();
    if(!raw)return _groq(k,prompt,mx,mi+1,json);
    if(!json)return raw;
    raw=raw.replace(/^```(?:json)?[\r\n]*/i,"").replace(/[\r\n]*```$/,"").trim();
    var m=raw.match(/\{[\s\S]*\}/);
    if(!m)return _groq(k,prompt,mx,mi+1,json);
    try{return JSON.parse(m[0]);}catch(e){return _groq(k,prompt,mx,mi+1,json);}
  });
}

  var testi=[];
  cards.filter(function(c){return !c.proposta&&(cardId==="tutte"||String(c.id)===String(cardId));}).forEach(function(c){
    (c.commenti||[]).forEach(function(cm){testi.push(cm.testo);if(cm.risposte)cm.risposte.forEach(function(r){testi.push(r.testo);});});
    if(c.tipo==="brainstorm")(c.idee||[]).forEach(function(i){testi.push(i.testo);});
  });
  var freq={};
  testi.join(" ").toLowerCase().replace(/[^a-zàèéìòùa-z\s]/gi,"").split(/\s+/).forEach(function(w){
    if(w.length<3||STOP_IT.has(w))return;
    freq[w]=(freq[w]||0)+1;
  });
  return Object.entries(freq).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];}).slice(0,50);
}

  // ── VALUTAZIONE AI STRUTTURATA: punti di forza / lacune / suggerimento ──
  async function valutaAperteProfAI(card,ris){
    if(!orKey){setAskKey(true);return;}
    var dom=card.quizDomande||[];
    var domAI=dom.map(function(d,i){return{d:d,i:i};}).filter(function(x){return x.d.tipo==="aperta";});
    if(!domAI.length)return;
    var pending=ris.filter(function(r){return !r.aiValutato;});
    if(!pending.length)return;
    setQLoading(true);
    try{
      // Parallel evaluation with concurrency limit of 4
      async function evalOne(r){
        var aiScores=r.aiScores||{};
        var dom2=card.quizDomande||[];
        var totale=dom2.length,score=0;
        dom2.forEach(function(d,i){
          if(d.tipo==="aperta")return;
          if(d.corretta==null||d.corretta===""){totale--;return;}
          if(r.risposte&&r.risposte[i]===d.corretta)score++;
        });
        // Eval open answers in parallel (per student)
        var openTasks=domAI.map(function(item){
          var risposta=(r.risposte&&r.risposte[item.i])||"";
          if(!risposta.trim())return Promise.resolve(null);
          var prompt=
            "Sei un docente di scuola secondaria. Valuta questa risposta aperta.\n\n"+
            "DOMANDA: "+item.d.testo+"\n"+
            "RISPOSTA: "+risposta+"\n\n"+
            "Restituisci SOLO questo JSON (nessun testo fuori):\n"+
            "{\n"+
            "  \"voto\": <numero 0.0-1.0>,\n"+
            "  \"punti_forza\": \"1-2 frasi: cosa ha capito davvero lo studente, cita qualcosa di specifico dalla sua risposta.\",\n"+
            "  \"lacune\": \"1-2 frasi: il concetto più importante che manca o è sbagliato, spiegato così che il prof possa intervenire subito.\",\n"+
            "  \"suggerimento\": \"1 frase: domanda o attività concreta che il prof può proporre a questo studente per colmare la lacuna principale.\"\n"+
            "}\n\n"+
            "Scala voto: 0.75-1.0=risposta completa e argomentata; 0.4-0.74=parziale ma pertinente; 0-0.39=assente o fuori tema.\n"+
            "Sii diretto e specifico su QUESTA risposta. Zero frasi generiche valide per qualsiasi studente.";
          return callGroqJSON(orKey,prompt,600)
            .then(function(res){return{idx:item.i,res:res};})
            .catch(function(){return null;});
        });
        var results=await Promise.all(openTasks);
        results.forEach(function(out){
          if(!out||!out.res)return;
          aiScores[out.idx]=out.res;
          if(out.res.voto!=null)score+=out.res.voto;
        });
        var pct=totale>0?Math.round(score/totale*100):0;
        await db.collection("quiz_risposte").doc(String(card.id)+"_"+r.studente).update({
          aiValutato:true,aiScores:aiScores,
          punteggio:{score:Math.round(score*10)/10,totale:totale,pct:pct}
        });
      }
      // Run up to 4 students in parallel
      var CHUNK=4;
      for(var ci=0;ci<pending.length;ci+=CHUNK){
        await Promise.all(pending.slice(ci,ci+CHUNK).map(evalOne));
      }
    }catch(e){showToast("Errore analisi AI risposte aperte","err");}
    setQLoading(false);
  }

  function cardContext(card){
    var nComm=(card.commenti||[]).length;
    var autoriUnici=[...new Set((card.commenti||[]).map(function(cm){return cm.autore;}))];
    var commTxt=nComm
      ?(card.commenti||[]).map(function(cm,i){
          var r=(i+1)+". "+cm.autore+": \""+cm.testo+"\"";
          if(cm.risposte&&cm.risposte.length)
            r+=cm.risposte.map(function(rep){return"\n   ↳ "+rep.autore+": \""+rep.testo+"\""}).join("");
          return r;
        }).join("\n")
      :"(nessun commento ancora)";
    var votiTxt="";
    if(card.opzioni){
      var tv=card.opzioni.reduce(function(a,o){return a+o.voti.length;},0);
      votiTxt="\nRisultati sondaggio ("+tv+" votanti):\n"+
        card.opzioni.map(function(o){
          var p=tv>0?Math.round(o.voti.length/tv*100):0;
          return "  - \""+o.testo+"\": "+o.voti.length+" voti ("+p+"%)";
        }).join("\n");
    }
    var quizTxt="";
    if(card.tipo==="quiz"&&card.quizDomande&&card.quizDomande.length){
      quizTxt="\nDomande quiz ("+card.quizDomande.length+" totali):\n"+
        card.quizDomande.map(function(d,i){
          return (i+1)+". ["+d.tipo+"] "+d.testo;
        }).join("\n");
    }
    return [
      "TIPO: "+card.tipo.toUpperCase(),
      "TITOLO: "+card.titolo,
      card.testo?"TESTO: "+card.testo:"",
      "DATA: "+card.data,
      "CLASSI: "+(card.classi||[]).join(", "),
      "PARTECIPAZIONE: "+nComm+" commenti da "+autoriUnici.length+" studenti diversi"+(autoriUnici.length>0?" ("+autoriUnici.join(", ")+")":""),
      votiTxt,
      quizTxt,
      nComm?"\nCOMMENTI:\n"+commTxt:""
    ].filter(Boolean).join("\n");
  }
